<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Tailwind Grid Example</title>
    <link rel="stylesheet" href="/src/index.css"> <!-- Tailwind CSS -->
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Grid container -->
    <div class="grid grid-cols-3 gap-6 w-2/3">

      <!-- Grid Item 1 -->
      <div class="h-40 bg-red-400 flex items-center justify-center text-white font-bold rounded-lg">
        Item 1
      </div>

      <!-- Grid Item 2 -->
      <div class="h-40 bg-blue-400 flex items-center justify-center text-white font-bold rounded-lg">
        Item 2
      </div>

      <!-- Grid Item 3 -->
      <div class="h-40 bg-green-400 flex items-center justify-center text-white font-bold rounded-lg">
        Item 3
      </div>

    </div>

  </body>
</html>
