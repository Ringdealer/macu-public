<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacuExpress Experiment</title>
  <!-- Tailwind CDN for quick prototyping -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Extend Tailwind with our color palette
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              DEFAULT: '#1E40AF',
              hover: '#2563EB',
              light: '#E0E7FF',
            },
            accent: {
              DEFAULT: '#FBBF24',
              light: '#FEF3C7',
            },
            neutral: {
              bg: '#F3F4F6',
              card: '#FFFFFF',
              border: '#D1D5DB',
              text: '#111827',
              secondary: '#6B7280',
            },
            success: '#16A34A',
            error: '#DC2626',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-neutral-bg font-sans">

  <div class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold text-center mb-8 text-neutral-text">Nuestros Productos</h1>

    <!-- Cart Preview -->
    <div class="mb-6 p-4 border rounded bg-neutral-card shadow-sm">
      <h2 class="text-lg font-bold mb-2">Vista del Carrito</h2>
      <ul class="space-y-1">
        <li>Arroz × 3 (€15)</li>
        <li>Harina × 2 (€10)</li>
      </ul>
      <div class="mt-3 font-bold text-accent">
        Total: €25
      </div>
      <div class="mt-2">
        <a href="#" class="text-primary hover:text-primary-hover font-medium">Ir a Carrito</a>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Single Product Card -->
      <div class="bg-neutral-card shadow-md rounded-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col">
        <div class="w-full h-48 bg-neutral-light overflow-hidden">
          <img src="https://via.placeholder.com/400x300?text=Arroz" alt="Arroz" class="w-full h-full object-cover">
        </div>
        <div class="p-4 flex flex-col flex-grow">
          <h2 class="text-lg font-semibold mb-2 text-neutral-text">Arroz</h2>
          <p class="text-neutral-secondary text-sm mb-4 flex-grow line-clamp-3">
            Arroz blanco de alta calidad, ideal para venta en contenedores.
          </p>
          <div class="text-xl font-bold text-accent mb-4">€5</div>
          <button class="bg-primary hover:bg-primary-hover text-white py-2 rounded-md font-medium transition">
            Añadir al Carrito
          </button>
        </div>
      </div>

      <!-- Repeat for another product -->
      <div class="bg-neutral-card shadow-md rounded-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition duration-300 flex flex-col">
        <div class="w-full h-48 bg-neutral-light overflow-hidden">
          <img src="https://via.placeholder.com/400x300?text=Harina" alt="Harina" class="w-full h-full object-cover">
        </div>
        <div class="p-4 flex flex-col flex-grow">
          <h2 class="text-lg font-semibold mb-2 text-neutral-text">Harina</h2>
          <p class="text-neutral-secondary text-sm mb-4 flex-grow line-clamp-3">
            Harina de trigo refinada, ideal para importación y venta al por mayor.
          </p>
          <div class="text-xl font-bold text-accent mb-4">€5</div>
          <button class="bg-primary hover:bg-primary-hover text-white py-2 rounded-md font-medium transition">
            Añadir al Carrito
          </button>
        </div>
      </div>

    </div>

    <!-- Pagination -->
    <div class="flex justify-center mt-10 gap-4">
      <button class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Anterior</button>
      <button class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-hover">Siguiente</button>
    </div>

  </div>

</body>
</html>
