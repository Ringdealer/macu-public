server {
    listen 80;
    server_name localhost;

    # Default root for the public frontend
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://macu_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin frontend (isolated React app)
    # Expected build output mounted at:
    # /usr/share/nginx/admin/
    location /admin/ {
        alias /usr/share/nginx/admin/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Public frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /en/api/ {
        proxy_pass http://macu_backend:8000;
    }
}